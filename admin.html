<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Console</title>
    <style>
        :root { --ios-blue: #007AFF; --bg: #F2F2F7; }
        body { margin: 0; background: var(--bg); font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: white; padding: 35px; border-radius: 35px; width: 90%; max-width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 18px; border-radius: 15px; border: 1.5px solid #E5E5EA; margin: 20px 0; font-size: 1rem; text-align: center; outline: none; background: #F9F9F9; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; background: var(--ios-blue); color: white; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        .reset { background: #FF3B30; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin:0; font-weight:800;">Muthi Core</h2>
        <p style="color:#8E8E93; font-size:0.9rem;">Global System API Settings</p>
        <input type="password" id="key" placeholder="Enter OpenRouter Key">
        <button class="btn" onclick="save()">Link Sonic Engine</button>
        <button class="btn reset" onclick="wipe()">Wipe Cache</button>
    </div>
    <script>
        const KEY = 'MUTHI_SONIC_ULTRA';
        function save() {
            const v = document.getElementById('key').value.trim();
            if(v) { localStorage.setItem(KEY, v); alert("System Linked Successfully! 🚀"); }
        }
        function wipe() { if(confirm("Clear all system data?")) { localStorage.removeItem(KEY); location.reload(); } }
    </script>
</body>
</html>
